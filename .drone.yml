# =============================================================================
# Pipeline 1: Validate deployment on PR to staging
# =============================================================================
kind: pipeline
type: docker
name: Validate deployment on staging

trigger:
  branch:
    - staging
  event:
    - pull_request
  paths:
    include:
      - force-app/**

concurrency:
  limit: 1

steps:
  - name: git-checkout
    image: alpine/git
    commands:
      - git fetch --all

  - name: clean-temp
    image: alpine
    commands:
      - rm -rf /tmp/sfdx

  - name: sfdx-validate
    image: salesforce/cli:latest-full
    environment:
      SFDX_AUTH_URL:
        from_secret: SFDX_URL_UAT
      SFDX_DISABLE_DNS_CHECK: true
    commands:
      - echo $SFDX_AUTH_URL > /tmp/sfdx_auth_url.txt
      - sf org login sfdx-url --sfdx-url-file /tmp/sfdx_auth_url.txt --set-default --alias uat
      - rm /tmp/sfdx_auth_url.txt
      - sf project deploy validate --source-dir force-app/main/default -l RunLocalTests -w 90

---
# =============================================================================
# Pipeline 2: Deploy to UAT on merge to staging + create promote PR to master
# =============================================================================
kind: pipeline
type: docker
name: Deploy to staging and create promote PR

trigger:
  branch:
    - staging
  event:
    - push
  paths:
    include:
      - force-app/**

steps:
  - name: git-checkout
    image: alpine/git
    commands:
      - git fetch --all

  - name: clean-temp
    image: alpine
    commands:
      - rm -rf /tmp/sfdx

  - name: deploy-to-uat
    image: salesforce/cli:latest-full
    environment:
      SFDX_AUTH_URL:
        from_secret: SFDX_URL_UAT
      SFDX_DISABLE_DNS_CHECK: true
    commands:
      - echo $SFDX_AUTH_URL > /tmp/sfdx_auth_url.txt
      - sf org login sfdx-url --sfdx-url-file /tmp/sfdx_auth_url.txt --set-default --alias uat
      - rm /tmp/sfdx_auth_url.txt
      - sf project deploy start --source-dir force-app/main/default -l RunLocalTests -w 90 --ignore-conflicts

  - name: create-promote-pr
    image: alpine/git
    environment:
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
    commands:
      - apk add --no-cache curl jq
      - git remote set-url origin https://x-access-token:$${GITHUB_TOKEN}@github.com/Jb-P-org/pixid-salesforce.git
      - |
        # Extract merged branch name from commit message (format: "Merge pull request #XX from org/branch-name")
        MERGED_BRANCH=$(echo "$${DRONE_COMMIT_MESSAGE}" | sed -n 's|.*from [^/]*/||p')
        if [ -z "$MERGED_BRANCH" ]; then
          MERGED_BRANCH="staging"
        fi
        BRANCH_NAME="promote/$MERGED_BRANCH"
        PROMOTE_TITLE="promote- $${DRONE_COMMIT_MESSAGE}"

        git push --force origin HEAD:$BRANCH_NAME

        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
          -H "Authorization: Bearer $${GITHUB_TOKEN}" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/Jb-P-org/pixid-salesforce/pulls" \
          -d "{
            \"title\": \"$PROMOTE_TITLE\",
            \"body\": \"Auto-generated PR to promote staging changes to production.\n\nGenerated by Drone CI.\",
            \"head\": \"$BRANCH_NAME\",
            \"base\": \"master\"
          }")
        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d')
        if [ "$HTTP_CODE" = "201" ]; then
          echo "Created promote PR: $PROMOTE_TITLE"
        elif [ "$HTTP_CODE" = "422" ]; then
          echo "PR already exists for $BRANCH_NAME, force-push updated it"
        else
          echo "GitHub API error (HTTP $HTTP_CODE): $BODY"
          exit 1
        fi

---
# =============================================================================
# Pipeline 3: Validate promotion on PR to master
# =============================================================================
kind: pipeline
type: docker
name: Validate promotion to production

trigger:
  branch:
    - master
  event:
    - pull_request

concurrency:
  limit: 1

steps:
  - name: git-checkout
    image: alpine/git
    commands:
      - git fetch --all

  - name: clean-temp
    image: alpine
    commands:
      - rm -rf /tmp/sfdx

  - name: sfdx-validate-promotion
    image: salesforce/cli:latest-full
    environment:
      SFDX_AUTH_URL:
        from_secret: SFDX_URL_PROD
      SFDX_DISABLE_DNS_CHECK: true
    commands:
      - echo $SFDX_AUTH_URL > /tmp/sfdx_auth_url.txt
      - sf org login sfdx-url --sfdx-url-file /tmp/sfdx_auth_url.txt --set-default --alias prod
      - rm /tmp/sfdx_auth_url.txt
      - echo y | sf plugins install sfdx-git-delta
      - mkdir -p .delta
      - sf sgd source delta --from origin/master --to HEAD --output .delta/
      - |
        DEPLOY_CMD="sf project deploy validate --manifest .delta/package/package.xml -l RunLocalTests -w 90"
        if [ -f .delta/destructiveChanges/destructiveChanges.xml ]; then
          DEPLOY_CMD="$DEPLOY_CMD --post-destructive-changes .delta/destructiveChanges/destructiveChanges.xml"
        fi
        eval $DEPLOY_CMD

---
# =============================================================================
# Pipeline 4: Deploy to production on merge to master
# =============================================================================
kind: pipeline
type: docker
name: Deploy to production

trigger:
  branch:
    - master
  event:
    - push

steps:
  - name: git-checkout
    image: alpine/git
    commands:
      - git fetch --all

  - name: clean-temp
    image: alpine
    commands:
      - rm -rf /tmp/sfdx

  - name: deploy-to-production
    image: salesforce/cli:latest-full
    environment:
      SFDX_AUTH_URL:
        from_secret: SFDX_URL_PROD
      SFDX_DISABLE_DNS_CHECK: true
    commands:
      - echo $SFDX_AUTH_URL > /tmp/sfdx_auth_url.txt
      - sf org login sfdx-url --sfdx-url-file /tmp/sfdx_auth_url.txt --set-default --alias prod
      - rm /tmp/sfdx_auth_url.txt
      - echo y | sf plugins install sfdx-git-delta
      - mkdir -p .delta
      - sf sgd source delta --from $DRONE_COMMIT_BEFORE --to HEAD --output .delta/
      - |
        DEPLOY_CMD="sf project deploy start --manifest .delta/package/package.xml -l RunLocalTests -w 90 --ignore-conflicts"
        if [ -f .delta/destructiveChanges/destructiveChanges.xml ]; then
          DEPLOY_CMD="$DEPLOY_CMD --post-destructive-changes .delta/destructiveChanges/destructiveChanges.xml"
        fi
        eval $DEPLOY_CMD

---
# =============================================================================
# Pipeline 5: Manual deployment to UAT
# =============================================================================
kind: pipeline
type: docker
name: Manual deployment

trigger:
  event:
    - custom

steps:
  - name: git-checkout
    image: alpine/git
    commands:
      - git fetch --all

  - name: clean-temp
    image: alpine
    commands:
      - rm -rf /tmp/sfdx

  - name: sfdx-setup-and-deploy
    image: salesforce/cli:latest-full
    environment:
      SFDX_AUTH_URL:
        from_secret: SFDX_URL_UAT
      SFDX_DISABLE_DNS_CHECK: true
    commands:
      - echo $SFDX_AUTH_URL > /tmp/sfdx_auth_url.txt
      - sf org login sfdx-url --sfdx-url-file /tmp/sfdx_auth_url.txt --set-default --alias uat
      - rm /tmp/sfdx_auth_url.txt
      - sf project deploy start --source-dir force-app/main/default -l RunLocalTests -w 90 --ignore-conflicts
